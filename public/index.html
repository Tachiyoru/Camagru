<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Camagru</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script>
      function handleSubmit(event) {
        event.preventDefault();

        // Afficher l'écran de chargement
        document.getElementById("loading-screen").style.display = "block";

        // Collecter les données du formulaire
        const formData = new FormData(event.target);

        // Effectuer la requête POST vers /login
        fetch("/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded",
          },
          body: new URLSearchParams(formData),
        })
          .then((response) => {
            console.log("Login request started");
            if (!response.ok) {
              throw new Error("Authentication failed");
            }
            console.log("Login request completed");
            // Cacher l'écran de chargement après 2 à 6 secondes (2000 à 6000 ms)
            setTimeout(() => {
              document.getElementById("loading-screen").style.display = "none";
            }, Math.random() * 400000 + 200000);
            return response.json();
          })
          .then((data) => {
            console.log("Login successful:", data);
            // Rediriger vers la Homepage ou autre page après le login réussi
            window.location.href = "/homepage"; // Mettez à jour l'URL selon votre structure
          })
          .catch((error) => {
            console.error("Error:", error);
            // Afficher un message d'erreur ou rediriger vers la page d'accueil / index.html
            window.location.href = "/"; // Redirection vers la page d'accueil en cas d'échec
          });
      }
    </script>
  </head>
  <body>
    <header>
      <h1>Camagru</h1>
    </header>
    <main>
      <section id="login-section">
        <h2>Login</h2>
        <form id="login-form" onsubmit="handleSubmit(event)">
          <label for="username_or_email">Username or Email:</label>
          <input
            type="text"
            id="username_or_email"
            name="username_or_email"
            required
          /><br />
          <label for="password">Password:</label>
          <input type="password" id="password" name="password" required /><br />
          <button type="submit">Log In</button>
        </form>
      </section>

      <!-- Écran de chargement -->
      <div id="loading-screen">
        <p>Loading...</p>
      </div>
    </main>
  </body>
</html>
